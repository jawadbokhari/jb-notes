title: JB's Notes
tagline: Personal notes on AI, tech, and development
description: >-
  Personal notes and writings by Jawad Bokhari on AI, technology, and development.

url: "https://jawadbokhari.github.io"
baseurl: "/jb-notes"

author:
  name: Jawad Bokhari

timezone: America/New_York

lang: en

theme: jekyll-theme-chirpy

collections:
  tabs:
    output: true
    sort_by: order

# Table of Contents
toc: true

# Pagination
paginate: 10
paginate_path: /page:num/

# Social links
github:
  username: jawadbokhari

# Comments - disabled
comments:
  active: false

# Analytics - disabled
analytics:
  google:
    id: ""

# Self-hosted fonts
webfonts: true

# Sidebar avatar (place image at /assets/img/avatar.jpg to use)
avatar: ""

# Theme mode: light | dark | auto
theme_mode: auto

# Jekyll defaults — theme gem does NOT auto-apply these
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: tabs
    values:
      layout: page

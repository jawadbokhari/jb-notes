name: Deploy Quartz to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Quartz
        run: |
          git clone https://github.com/jackyzha0/quartz.git .quartz-build
          cd .quartz-build && git checkout 512d48d7193b365a54a9159e02b750e4c291d8f2

      - name: Copy content and config
        run: |
          rm -rf .quartz-build/content/*
          cp -r content/. .quartz-build/content/
          cp quartz.config.ts .quartz-build/quartz.config.ts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .quartz-build/package-lock.json

      - name: Install dependencies
        working-directory: .quartz-build
        run: npm ci

      - name: Build
        working-directory: .quartz-build
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz-build/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
